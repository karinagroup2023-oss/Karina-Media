<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Еркин Каримов</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:  #c9a84c;
  --gold2: #f0d080;
  --gold3: #8b6914;
  --bg:    #0a0a0a;
  --text:  #e8e0d0;
}

html,body{
  height:100%;
  background:var(--bg);
  font-family:Georgia,'Times New Roman',serif;
  color:var(--text);
  overflow-x:hidden;
}

/* ── Particles canvas ── */
#cvs{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── Vignette ── */
body::after{
  content:'';
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.75) 100%);
  pointer-events:none;z-index:1;
}

/* ── Page ── */
.page{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}

/* ── Card ── */
.card{
  width:100%;max-width:520px;
  text-align:center;
  animation:reveal 1.2s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes reveal{
  from{opacity:0;transform:translateY(32px)}
  to  {opacity:1;transform:translateY(0)}
}

/* ── Top ornament ── */
.ornament{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin-bottom:36px;
  opacity:0;animation:fadeIn 0.8s 0.4s ease both;
}
.orn-line{
  flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold3),var(--gold),var(--gold3),transparent);
}
.orn-diamond{
  width:8px;height:8px;
  background:var(--gold);
  transform:rotate(45deg);
  box-shadow:0 0 10px rgba(201,168,76,0.6);
  flex-shrink:0;
}

/* ── Monogram ── */
.monogram{
  width:88px;height:88px;
  border-radius:50%;
  margin:0 auto 28px;
  position:relative;
  opacity:0;animation:scaleIn 0.7s 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.monogram-ring{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,var(--gold3),var(--gold),var(--gold2),var(--gold),var(--gold3));
  animation:spinSlow 12s linear infinite;
}
.monogram-inner{
  position:absolute;inset:3px;border-radius:50%;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.monogram-text{
  font-size:26px;font-weight:700;font-style:italic;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--gold3),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}

/* ── Pre-name label ── */
.pre-name{
  font-size:10px;letter-spacing:0.35em;text-transform:uppercase;
  color:var(--gold);opacity:0.6;
  margin-bottom:12px;
  opacity:0;animation:fadeIn 0.6s 0.7s ease both;
}

/* ── Name ── */
.name{
  font-size:clamp(36px,9vw,58px);
  font-weight:700;font-style:italic;
  letter-spacing:-1px;line-height:1;
  background:linear-gradient(160deg,var(--gold3) 0%,var(--gold2) 40%,var(--gold) 60%,var(--gold3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 24px rgba(201,168,76,0.35));
  margin-bottom:16px;
  opacity:0;animation:fadeIn 0.8s 0.8s ease both;
}

/* ── Divider slim ── */
.slim{
  width:60px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0 auto 16px;
  opacity:0;animation:fadeIn 0.6s 1s ease both;
}

/* ── Role ── */
.role{
  font-size:14px;letter-spacing:0.12em;
  color:rgba(232,224,208,0.6);
  margin-bottom:6px;font-style:normal;
  opacity:0;animation:fadeIn 0.6s 1.1s ease both;
}
.company{
  font-size:12px;letter-spacing:0.25em;text-transform:uppercase;
  color:var(--gold);
  opacity:0;animation:fadeIn 0.6s 1.2s ease both;
}

/* ── Wide ornament ── */
.ornament-wide{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin:32px 0;
  opacity:0;animation:fadeIn 0.6s 1.3s ease both;
}
.ornament-wide .orn-line{
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.25),transparent);
}
.orn-text{
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(201,168,76,0.35);white-space:nowrap;
}

/* ── Socials ── */
.socials{
  display:flex;justify-content:center;gap:16px;flex-wrap:wrap;
  margin-bottom:36px;
  opacity:0;animation:fadeIn 0.7s 1.4s ease both;
}

.soc{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  text-decoration:none;color:rgba(232,224,208,0.45);
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.soc-icon{
  width:48px;height:48px;border-radius:50%;
  border:1px solid rgba(201,168,76,0.2);
  display:flex;align-items:center;justify-content:center;
  background:rgba(201,168,76,0.04);
  transition:all 0.3s;
  position:relative;overflow:hidden;
}
.soc-icon::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,0.15),transparent 70%);
  opacity:0;transition:opacity 0.3s;
}
.soc-icon svg{width:20px;height:20px;position:relative;z-index:1}

.soc-label{
  font-size:9px;letter-spacing:0.15em;text-transform:uppercase;
  font-family:-apple-system,sans-serif;
  transition:color 0.3s;
}

.soc:hover{color:var(--gold2);transform:translateY(-4px)}
.soc:hover .soc-icon{
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(201,168,76,0.3),0 8px 24px rgba(0,0,0,0.4);
}
.soc:hover .soc-icon::before{opacity:1}

/* ── CTA ── */
.cta-wrap{
  opacity:0;animation:fadeIn 0.7s 1.5s ease both;
  margin-bottom:40px;
}

.cta{
  display:inline-flex;align-items:center;gap:12px;
  text-decoration:none;color:var(--bg);
  background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2),var(--gold));
  background-size:200% 100%;
  font-family:-apple-system,sans-serif;
  font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
  padding:15px 40px;
  border-radius:2px;
  transition:all 0.4s;
  position:relative;overflow:hidden;
}

.cta::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,transparent 100%);
  pointer-events:none;
}

.cta:hover{
  background-position:100% 0;
  box-shadow:0 8px 32px rgba(201,168,76,0.4),0 2px 8px rgba(0,0,0,0.5);
  transform:translateY(-2px) scale(1.02);
  color:#000;
}
.cta:active{transform:translateY(0) scale(1)}
.cta svg{width:16px;height:16px}

/* ── Bottom ornament ── */
.bottom{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;animation:fadeIn 0.6s 1.7s ease both;
}
.ornament-bottom{
  display:flex;align-items:center;gap:14px;width:100%;
}
.ornament-bottom .orn-line{
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.2),transparent);
}
.footer-text{
  font-size:10px;letter-spacing:0.25em;text-transform:uppercase;
  color:rgba(201,168,76,0.25);
  font-family:-apple-system,sans-serif;
}

/* ── Util ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:420px){
  .socials{gap:12px}
  .soc-icon{width:42px;height:42px}
}
</style>

<script>
// ── Gold dust particles ──
(function(){
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');

  function resize(){cvs.width=innerWidth;cvs.height=innerHeight}
  resize();
  window.addEventListener('resize',resize);

  const P = Array.from({length:90},()=>({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    r: Math.random()*1.8+0.4,
    vx:(Math.random()-0.5)*0.25,
    vy:(Math.random()-0.5)*0.15-0.05,
    a: Math.random(),
    va:Math.random()*0.005+0.002,
    dir:Math.random()<0.5?1:-1,
  }));

  function draw(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    P.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      p.a+=p.va*p.dir;
      if(p.a>0.7||p.a<0) p.dir*=-1;
      if(p.x<0)p.x=cvs.width;
      if(p.x>cvs.width)p.x=0;
      if(p.y<0)p.y=cvs.height;
      if(p.y>cvs.height)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(201,168,76,${p.a*0.8})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Parallax on mouse ──
document.addEventListener('mousemove',e=>{
  const dx=(e.clientX-innerWidth/2)/innerWidth;
  const dy=(e.clientY-innerHeight/2)/innerHeight;
  document.querySelector('.card').style.transform=
    `perspective(1200px) rotateY(${dx*5}deg) rotateX(${-dy*4}deg)`;
});
document.addEventListener('mouseleave',()=>{
  document.querySelector('.card').style.transform='';
});
</script>

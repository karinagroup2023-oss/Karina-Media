<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Еркин Каримов — KARINA Media</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            overflow: hidden;
            background: #111111;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.06),
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 120px rgba(168, 85, 247, 0.08);
            position: relative;
        }

        /* Header with photo */
        .card-header {
            height: 280px;
            position: relative;
            overflow: hidden;
        }

        .card-header-bg {
            position: absolute;
            inset: 0;
            background: url('photo.jpeg') center top / cover no-repeat;
        }

        .card-header-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(17, 17, 17, 0) 0%,
                rgba(17, 17, 17, 0) 40%,
                rgba(17, 17, 17, 0.6) 70%,
                rgba(17, 17, 17, 1) 100%
            );
        }

        .card-header-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px 32px;
            z-index: 2;
        }

        /* Content */
        .card-body {
            padding: 8px 32px 28px;
        }

        .name {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .title-role {
            font-size: 14px;
            font-weight: 500;
            color: #a855f7;
            margin-top: 6px;
        }

        .company {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 2px;
            font-weight: 400;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent);
            margin: 24px 0;
        }

        /* Contact items */
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .contact-item:hover {
            background: rgba(168, 85, 247, 0.08);
            transform: translateX(4px);
        }

        .contact-item:active {
            transform: scale(0.98);
        }

        .contact-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
        }

        .contact-icon svg {
            width: 20px;
            height: 20px;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-label {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .contact-value {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-arrow {
            color: rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }

        /* Social icons row */
        .social-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .social-btn {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
        }

        .social-btn:hover {
            transform: translateY(-3px);
            border-color: rgba(168, 85, 247, 0.3);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.15);
        }

        .social-btn svg {
            width: 22px;
            height: 22px;
        }

        /* Save button */
        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            margin-top: 24px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.35);
        }

        .save-btn:active {
            transform: scale(0.98);
        }

        .save-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Footer */
        .card-footer {
            padding: 16px 32px 24px;
            text-align: center;
        }

        .footer-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeInUp 0.6s ease-out;
        }

        .contact-item {
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .contact-item:nth-child(1) { animation-delay: 0.1s; }
        .contact-item:nth-child(2) { animation-delay: 0.15s; }
        .contact-item:nth-child(3) { animation-delay: 0.2s; }

        .social-btn {
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .social-btn:nth-child(1) { animation-delay: 0.25s; }
        .social-btn:nth-child(2) { animation-delay: 0.3s; }
        .social-btn:nth-child(3) { animation-delay: 0.35s; }

        /* Ripple effect on save button */
        .save-btn {
            position: relative;
            overflow: hidden;
        }

        .save-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            transform: translateX(-100%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>

    <script>
        function saveContact() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
N:Каримов;Еркин;;;
FN:Еркин Каримов
ORG:KARINA Media
TITLE:CEO и Основатель
TEL;TYPE=CELL:+7-706-656-77-65
EMAIL:karina.group2023@gmail.com
ADR;TYPE=WORK:;;пр.Б.Момышулы д.2В, н.п.1а;Астана;;;Казахстан
URL:https://www.instagram.com/karinamedia01/
NOTE:WhatsApp: +7-706-656-77-65 | Telegram: @karina_media
END:VCARD`;

            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Erkin_Karimov_KARINA_Media.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
